{% extends "base.html" %}

{% block title %}
OCR Result
{% endblock %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-success text-white">

        <h3>OCR Extraction Result</h3>

    </div>

    <div class="card-body">

        <textarea
            class="form-control"
            rows="20"
            readonly>{{ extracted_text }}</textarea>

    </div>

    <div class="card-footer">

        <a href="/"
           class="btn btn-primary">

            Upload Another Document

        </a>

    </div>

</div>

{% endblock %}
